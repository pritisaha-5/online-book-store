<!DOCTYPE html>
<html>
<head>
    <title>Home Page</title>

    <style>
        body {
            background-color: rgb(35, 62, 35);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Navbar */
        .navbar {
            background-color: #222;
            padding: 15px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-size: 18px;
            padding: 8px 12px;
            border-radius: 5px;
        }

        .navbar a:hover {
            background-color: #4CAF50;
        }

        /* Heading */
        h1 {
            color: white;
            margin-top: 40px;
        }

        /* Content Box */
        .container {
            background-color: white;
            width: 60%;
            margin: 30px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        /* Button */
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: darkgreen;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <a href="Userlogin.html">User Login</a>
        <a href="registration.html">Register</a>
        <a href="catalogue.html">Book Catalogue</a>
        <a href="cart.html">Cart</a>
        <a href="payment.html">Payment</a>
    </div>

    <!-- Heading -->
    <h1>📚 Welcome to Online Book Store</h1>

    <!-- Content -->
    <div class="container">
        <h2>Discover Your Next Favorite Book</h2>
        <p>
            Browse through our collection of amazing books, add them to your cart,
            and enjoy a smooth shopping experience.
        </p>

        <a href="catalogue.html">
            <button class="btn">Explore Books</button>
        </a>
    </div>

</body>
</html>
