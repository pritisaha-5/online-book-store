<!DOCTYPE html>
<html>
<head>
    <title>Thank You</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f4f4f4;
            margin-top: 100px;
        }

        .box {
            background: white;
            padding: 30px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            color: green;
        }

        p {
            font-size: 18px;
        }

        a {
            text-decoration: none;
            color: white;
            background: green;
            padding: 10px 15px;
            border-radius: 5px;
        }

        a:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>🎉 Thank You!</h1>
        <p>🙏 Thanks for shopping with us!</p>
        <p>Your order has been placed successfully.</p>

        <br>
        <a href="catalogue.html">Continue Shopping</a>
    </div>

</body>
</html>
